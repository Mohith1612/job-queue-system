receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    send_batch_size: 512
    timeout: 5s

exporters:
  # Traces → Tempo (wired in Phase 3)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Debug exporter — logs spans to collector stdout (useful before Tempo is up)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
