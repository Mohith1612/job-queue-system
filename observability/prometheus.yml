global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: job-queue-api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics

  - job_name: job-queue-worker
    static_configs:
      - targets: [worker:8001]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
    metrics_path: /metrics
